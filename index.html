<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Verification...</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
}

#loading {
    color: white;
    font-size: 1.5em;
}

#message {
    display: none;
    position: absolute;
    font-size: 2.5em;
    font-weight: bold;
    text-align: center;
    color: white;
    text-shadow: 0 0 20px red;
    animation: shake 0.1s infinite, spin 2s linear infinite;
}

/* Shake animation */
@keyframes shake {
    0% { transform: translate(0px, 0px); }
    25% { transform: translate(5px, -5px); }
    50% { transform: translate(-5px, 5px); }
    75% { transform: translate(5px, 5px); }
    100% { transform: translate(-5px, -5px); }
}

/* Spin animation */
@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div id="loading">Tap to Verify Device...</div>

<div id="message">
    Fuck you Zernechel 2828,<br>
    I am not a nerd!
</div>

<script>
const loading = document.getElementById("loading");
const message = document.getElementById("message");

let chaosStarted = false;

document.body.addEventListener("click", () => {

    if (chaosStarted) return;
    chaosStarted = true;

    loading.style.display = "none";
    message.style.display = "block";

    // 🔊 Spawn multiple looping audio layers
    for (let i = 0; i < 6; i++) {
        let audio = new Audio("meme.mp3");
        audio.volume = 1.0;
        audio.loop = true;
        audio.play();
    }

    // 🔊 Keep stacking more every 2 seconds
    setInterval(() => {
        let extra = new Audio("meme.mp3");
        extra.volume = 1.0;
        extra.play();
    }, 2000);

    // 🌈 Flashing background
    setInterval(() => {
        document.body.style.background =
            "rgb(" +
            Math.floor(Math.random() * 255) + "," +
            Math.floor(Math.random() * 255) + "," +
            Math.floor(Math.random() * 255) + ")";
    }, 100);

});
</script>

</body>
</html>
